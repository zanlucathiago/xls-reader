name: CodeQL

# Static analysis for a library that parses untrusted binary input. Runs on
# pushes, PRs, and weekly to catch newly published query updates.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "31 5 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.36.2
        with:
          languages: ${{ matrix.language }}
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4.36.2
