version: 2
updates:
  # The package ships zero runtime deps, so everything here is a dev dependency.
  # Group them into a single weekly PR (all update types) — this keeps related
  # tools that must move together in lockstep (e.g. vitest + @vitest/coverage-v8,
  # which pin the same version) in one reviewable change instead of many.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Let releases age before we adopt them — the same supply-chain posture as
    # this project's whole reason to exist. Mirrors pnpm's `minimumReleaseAge`
    # so Dependabot stops proposing hours-old patches (e.g. it won't jump to a
    # version published today; it waits out the window first).
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      dev-dependencies:
        patterns:
          - "*"

  # Keep the GitHub Actions current. Group everything (including majors) so a
  # runner/Node bump lands as a single reviewable PR.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # github-actions cooldown only supports `default-days` (no per-semver keys).
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"
